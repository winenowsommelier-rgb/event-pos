<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>PDF Price List Processor</title>
  <style>
    body { font-family: Inter, system-ui, sans-serif; background:#f7f7fb; margin:0; color:#111; }
    .wrap { max-width: 860px; margin: 40px auto; background:#fff; border:1px solid #e5e7eb; border-radius:16px; padding:24px; }
    h1 { margin-top:0; }
    .drop { border:2px dashed #cbd5e1; border-radius:12px; padding:24px; text-align:center; background:#f8fafc; }
    .drop.drag { border-color:#7a1f2b; background:#fff1f2; }
    .actions { margin-top:16px; display:flex; gap:10px; align-items:center; flex-wrap:wrap; }
    button { border:0; border-radius:10px; padding:10px 14px; cursor:pointer; background:#7a1f2b; color:#fff; }
    button:disabled { opacity:0.6; cursor:not-allowed; }
    .muted { color:#6b7280; font-size:14px; }
    #log { margin-top:16px; white-space:pre-wrap; font-size:14px; background:#0f172a; color:#e2e8f0; padding:12px; border-radius:10px; min-height:100px; }
    .files { margin-top:12px; font-size:14px; }
  </style>
</head>
<body>
  <div class="wrap">
    <h1>PDF Price List → Excel</h1>
    <p class="muted">Upload one or more PDF price lists. The tool will return an Excel file with <strong>Clean_Data</strong>, <strong>Validation_Errors</strong>, and <strong>Audit_Log</strong>.</p>

    <div id="drop" class="drop">
      <input id="fileInput" type="file" accept="application/pdf" multiple />
      <p>Drag and drop PDF files here or use file picker.</p>
    </div>

    <div class="actions">
      <button id="runBtn">Process files</button>
      <span id="status" class="muted">No files selected.</span>
    </div>

    <div id="files" class="files"></div>
    <div id="log"></div>
  </div>

  <script>
    const fileInput = document.getElementById('fileInput');
    const runBtn = document.getElementById('runBtn');
    const statusEl = document.getElementById('status');
    const filesEl = document.getElementById('files');
    const logEl = document.getElementById('log');
    const drop = document.getElementById('drop');

    function selectedFiles() {
      return Array.from(fileInput.files || []);
    }

    function renderFiles() {
      const files = selectedFiles();
      if (!files.length) {
        filesEl.textContent = '';
        statusEl.textContent = 'No files selected.';
        return;
      }
      statusEl.textContent = `${files.length} PDF(s) selected.`;
      filesEl.innerHTML = `<strong>Selected:</strong> ${files.map((f) => f.name).join(', ')}`;
    }

    function log(msg) {
      logEl.textContent += `${msg}\n`;
    }

    async function runProcess() {
      const files = selectedFiles();
      if (!files.length) {
        log('Please select at least one PDF file.');
        return;
      }

      runBtn.disabled = true;
      logEl.textContent = '';
      log(`Uploading ${files.length} file(s)...`);

      const formData = new FormData();
      files.forEach((file) => formData.append('files', file));

      try {
        const response = await fetch('/api/process', { method: 'POST', body: formData });
        if (!response.ok) {
          const payload = await response.json().catch(() => ({}));
          throw new Error(payload.error || `HTTP ${response.status}`);
        }

        const blob = await response.blob();
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url;
        a.download = 'pricelist_clean.xlsx';
        a.click();
        URL.revokeObjectURL(url);

        log('Done. Excel file downloaded.');
      } catch (error) {
        log(`Error: ${error.message}`);
      } finally {
        runBtn.disabled = false;
      }
    }

    fileInput.addEventListener('change', renderFiles);
    runBtn.addEventListener('click', runProcess);

    drop.addEventListener('dragover', (event) => {
      event.preventDefault();
      drop.classList.add('drag');
    });

    drop.addEventListener('dragleave', () => drop.classList.remove('drag'));

    drop.addEventListener('drop', (event) => {
      event.preventDefault();
      drop.classList.remove('drag');
      fileInput.files = event.dataTransfer.files;
      renderFiles();
    });
  </script>
</body>
</html>
